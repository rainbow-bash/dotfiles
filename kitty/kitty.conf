enable_audio_bell no
window_padding_width 0 16
map ctrl+, send_key alt+m
map ctrl+; send_key alt+t
map ctrl+1 send_key alt+1
map ctrl+2 send_key alt+2
map ctrl+3 send_key alt+3
map ctrl+4 send_key alt+4
map ctrl+5 send_key alt+5
map ctrl+tab send_key alt+y
map ctrl+shift+k no_op
map ctrl+shift+j no_op
map ctrl+shift+h no_op
map ctrl+shift+l no_op
map f11 toggle_fullscreen
# vim:ft=kitty
background_opacity 0.97
include ./vague.conf

# BEGIN_KITTY_FONTS
font_family      family="0xProto Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
